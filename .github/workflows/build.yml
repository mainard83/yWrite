name: Build yWrite UWP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore dependencies
      run: msbuild yWrite_UWP.csproj /t:Restore /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

    - name: Build and Package
      run: msbuild yWrite_UWP.csproj /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /p:AppxPackage=true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: yWrite-${{ matrix.platform }}-${{ matrix.configuration }}
        path: AppPackages/
