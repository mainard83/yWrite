<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>yWrite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f3f3f3;
  --fg: #111111;
  --dim: rgba(0,0,0,0.45);
}
[data-theme="dark"] {
  --bg: #000000;  /* pure black */
  --fg: #eaeaea;
  --dim: rgba(255,255,255,0.45);
}
body {
  margin: 0;
  background: var(--bg);
  display: flex;
  justify-content: center;
  font-family: "iA Writer Quattro", "Inter", monospace;
  color: var(--fg);
}
#wrap {
  width: 1100px;          /* requested width */
  min-height: 100vh;
  outline: none;
  border: none;
  white-space: pre-wrap;
  word-wrap: break-word;
  font-size: 13pt;
  line-height: 1.65;
  padding: 180px 40px 100px 40px;
  box-sizing: border-box;
  background: transparent;
}
#status {
  position: fixed;
  bottom: 12px;
  right: 14px;
  font-size: 12px;
  opacity: 0.85;
  user-select: none;
}
#status span {
  margin-left: 14px;
  cursor: pointer;
}
.focus span.dim {
  color: var(--dim);
}
</style>
</head>
<body data-theme="light">
<div id="wrap" contenteditable="true" spellcheck="true"></div>
<div id="status">
  <span id="themeBtn">🌙</span>
  <span id="focusBtn">◎</span>
  <span id="counts"></span>
</div>
<script>
const wrap = document.getElementById("wrap");
const counts = document.getElementById("counts");
const themeBtn = document.getElementById("themeBtn");
const focusBtn = document.getElementById("focusBtn");
let theme = "light";
let focus = false;

function updateCounts() {
  const text = wrap.innerText || "";
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const chars = text.length;
  counts.textContent = `${words}w  ${chars}c`;
}
wrap.addEventListener("input", updateCounts);

themeBtn.onclick = () => {
  theme = theme === "light" ? "dark" : "light";
  document.body.dataset.theme = theme;
  themeBtn.textContent = theme === "light" ? "🌙" : "☀️";
};

focusBtn.onclick = () => {
  focus = !focus;
  focusBtn.textContent = focus ? "◉" : "◎";
  if (!focus) {
    wrap.innerHTML = wrap.innerText;
  } else {
    const text = wrap.innerText;
    const sentences = text.split(/([.!?]\s)/g);
    wrap.innerHTML = sentences.map((s, i) => {
      if (i === sentences.length - 1) return `<span>${s}</span>`;
      return `<span class="${i % 2 === 0 ? '' : 'dim'}">${s}</span>`;
    }).join("");
  }
};
updateCounts();
</script>
</body>
</html>
